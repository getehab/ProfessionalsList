<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Maintenance Professionals</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #533AB7; --purple-light: #EEEDFE; --purple-mid: #7F77DD;
    --teal-light: #EAF3DE; --teal-dark: #3B6D11; --teal-mid: #639922;
    --amber-light: #FAEEDA; --amber-dark: #854F0B; --amber-mid: #BA7517;
    --coral-light: #FAECE7; --coral-dark: #993C1D; --coral-mid: #D85A30;
    --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
    --bg: #f5f5f3; --surface: #ffffff; --text: #1a1a18; --muted: #5f5e5a;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; display: flex; align-items: center; gap: 6px; }
  .tab.active { color: var(--text); border-bottom: 2px solid var(--purple); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }
  .page { display: none; } .page.active { display: block; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; margin-top: 16px; }
  label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%; font-size: 14px; padding: 9px 11px;
    border: 0.5px solid var(--border-md); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--purple-mid); box-shadow: 0 0 0 3px rgba(127,119,221,.15); }
  textarea { resize: vertical; min-height: 80px; }
  .rating-group { display: flex; gap: 8px; margin-top: 6px; }
  .rating-btn {
    flex: 1; padding: 9px 6px; border: 0.5px solid var(--border-md); border-radius: var(--radius);
    background: var(--surface); color: var(--muted); font-size: 13px; cursor: pointer;
    transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: inherit;
  }
  .rating-btn:hover { border-color: var(--purple-mid); color: var(--text); }
  .rating-btn.selected.ng { background: var(--coral-light); border-color: var(--coral-mid); color: var(--coral-dark); font-weight: 500; }
  .rating-btn.selected.ok { background: var(--amber-light); border-color: var(--amber-mid); color: var(--amber-dark); font-weight: 500; }
  .rating-btn.selected.gd { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal-dark); font-weight: 500; }
  .submit-btn { width: 100%; margin-top: 22px; padding: 11px; background: var(--purple); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
  .submit-btn:hover { background: #3C3489; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .alert { display: none; border-radius: var(--radius); padding: 12px 14px; font-size: 13px; margin-top: 14px; align-items: center; gap: 8px; }
  .alert.show { display: flex; }
  .alert-success { background: var(--teal-light); border: 0.5px solid var(--teal-mid); color: var(--teal-dark); }
  .alert-error { background: var(--coral-light); border: 0.5px solid var(--coral-mid); color: var(--coral-dark); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-row input, .filter-row select { flex: 1; min-width: 130px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--purple); flex-shrink: 0; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 500; }
  .card-phone { font-size: 13px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .card-meta { display: flex; gap: 7px; margin-top: 9px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
  .badge-svc { background: var(--purple-light); color: var(--purple); }
  .badge-ng { background: var(--coral-light); color: var(--coral-dark); }
  .badge-ok { background: var(--amber-light); color: var(--amber-dark); }
  .badge-gd { background: var(--teal-light); color: var(--teal-dark); }
  .card-notes { font-size: 12px; color: var(--muted); margin-top: 7px; font-style: italic; }
  .card-date { font-size: 11px; color: #aaa; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .cnt { font-size: 12px; background: #eee; border-radius: 999px; padding: 2px 8px; color: var(--muted); margin-left: 6px; }
  #other-wrap { display: none; }
  .config-banner { background: var(--amber-light); border: 0.5px solid var(--amber-mid); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--amber-dark); margin-bottom: 20px; }
  .config-banner input { margin-top: 8px; border-color: var(--amber-mid); }
  .config-banner button { margin-top: 8px; padding: 7px 14px; background: var(--amber-mid); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-family: inherit; }
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-tools" style="font-size:22px;vertical-align:-3px;margin-right:6px" aria-hidden="true"></i>Home Maintenance Pros</h1>
  <p class="subtitle">Your local directory of trusted home maintenance professionals</p>

  <div id="config-banner" class="config-banner" style="display:none">
    <strong>Setup required:</strong> Paste your Google Apps Script Web App URL below to connect to Google Sheets.
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/…/exec">
    <br><button onclick="saveScriptUrl()">Save & connect</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('add')"><i class="ti ti-plus" aria-hidden="true"></i> Add professional</button>
    <button class="tab" onclick="showTab('view')"><i class="ti ti-users" aria-hidden="true"></i> View directory <span class="cnt" id="cnt">—</span></button>
  </div>

  <!-- ADD PAGE -->
  <div id="add" class="page active">
    <label for="f-name">Full name</label>
    <input type="text" id="f-name" placeholder="e.g. John Smith">

    <label for="f-phone">Phone number</label>
    <input type="tel" id="f-phone" placeholder="e.g. 905-555-0123">

    <label for="f-service">Service type</label>
    <select id="f-service" onchange="toggleOther()">
      <option value="">— Select a service —</option>
      <option>Painting</option>
      <option>Plumbing</option>
      <option>Handyman</option>
      <option>Electrical</option>
      <option>HVAC</option>
      <option>Landscaping</option>
      <option>Cleaning</option>
      <option value="Other">Other…</option>
    </select>

    <div id="other-wrap">
      <label for="f-other">Describe the service</label>
      <input type="text" id="f-other" placeholder="e.g. Roof repair">
    </div>

    <label>Service rating</label>
    <div class="rating-group">
      <button class="rating-btn ng" onclick="selectRating('no-good',this)"><i class="ti ti-mood-sad" aria-hidden="true"></i> No good</button>
      <button class="rating-btn ok" onclick="selectRating('acceptable',this)"><i class="ti ti-mood-neutral" aria-hidden="true"></i> Acceptable</button>
      <button class="rating-btn gd" onclick="selectRating('good',this)"><i class="ti ti-mood-smile" aria-hidden="true"></i> Good</button>
    </div>
    <input type="hidden" id="f-rating">

    <label for="f-notes">Additional notes (optional)</label>
    <textarea id="f-notes" placeholder="Any extra details about this professional or the work done…"></textarea>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">
      <div class="spinner" id="spinner"></div>
      <i class="ti ti-check" id="submit-icon" aria-hidden="true"></i>
      <span id="submit-label">Save professional</span>
    </button>
    <div class="alert alert-success" id="success-msg"><i class="ti ti-circle-check" aria-hidden="true"></i> Professional saved to Google Sheets!</div>
    <div class="alert alert-error" id="error-msg"><i class="ti ti-alert-circle" aria-hidden="true"></i> <span id="error-text">Something went wrong. Check the script URL.</span></div>
  </div>

  <!-- VIEW PAGE -->
  <div id="view" class="page">
    <div class="filter-row">
      <input type="text" id="fil-name" placeholder="Search by name…" oninput="renderCards()">
      <select id="fil-service" onchange="renderCards()">
        <option value="">All services</option>
        <option>Painting</option>
        <option>Plumbing</option>
        <option>Handyman</option>
        <option>Electrical</option>
        <option>HVAC</option>
        <option>Landscaping</option>
        <option>Cleaning</option>
        <option>Other</option>
      </select>
      <select id="fil-rating" onchange="renderCards()">
        <option value="">All ratings</option>
        <option value="good">Good</option>
        <option value="acceptable">Acceptable</option>
        <option value="no-good">No good</option>
      </select>
    </div>
    <div id="cards-container"><div class="loading-overlay"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px"></i>Loading…</div></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hm_script_url';
let allPros = [];

function getScriptUrl() { return localStorage.getItem(STORAGE_KEY) || ''; }
function saveScriptUrl() {
  const v = document.getElementById('script-url-input').value.trim();
  if (!v) return;
  localStorage.setItem(STORAGE_KEY, v);
  document.getElementById('config-banner').style.display = 'none';
  loadPros();
}

function checkConfig() {
  const url = getScriptUrl();
  if (!url) document.getElementById('config-banner').style.display = 'block';
  return !!url;
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['add','view'][i] === t));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  if (t === 'view') loadPros();
}

function toggleOther() {
  document.getElementById('other-wrap').style.display =
    document.getElementById('f-service').value === 'Other' ? 'block' : 'none';
}

function selectRating(r, btn) {
  document.getElementById('f-rating').value = r;
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function submitForm() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const svc   = document.getElementById('f-service').value;
  const other = document.getElementById('f-other').value.trim();
  const rating= document.getElementById('f-rating').value;
  const notes = document.getElementById('f-notes').value.trim();
  if (!name || !phone || !svc || !rating) { alert('Please fill in name, phone, service, and rating.'); return; }
  if (!checkConfig()) return;

  const service = svc === 'Other' ? (other || 'Other') : svc;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('submit-icon').style.display = 'none';
  document.getElementById('submit-label').textContent = 'Saving…';
  document.getElementById('success-msg').classList.remove('show');
  document.getElementById('error-msg').classList.remove('show');

  try {
    const res = await fetch(getScriptUrl(), {
      method: 'POST',
      body: JSON.stringify({ name, phone, service, rating, notes }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('success-msg').classList.add('show');
      document.getElementById('f-name').value = '';
      document.getElementById('f-phone').value = '';
      document.getElementById('f-service').value = '';
      document.getElementById('f-other').value = '';
      document.getElementById('f-notes').value = '';
      document.getElementById('other-wrap').style.display = 'none';
      document.getElementById('f-rating').value = '';
      document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
      setTimeout(() => document.getElementById('success-msg').classList.remove('show'), 5000);
    } else { throw new Error(data.message || 'Unknown error'); }
  } catch (err) {
    document.getElementById('error-text').textContent = err.message || 'Could not reach the script. Check the URL.';
    document.getElementById('error-msg').classList.add('show');
  } finally {
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('submit-icon').style.display = '';
    document.getElementById('submit-label').textContent = 'Save professional';
  }
}

async function loadPros() {
  if (!checkConfig()) { document.getElementById('cards-container').innerHTML = '<div class="loading-overlay">Connect Google Sheets first using the banner above.</div>'; return; }
  document.getElementById('cards-container').innerHTML = '<div class="loading-overlay"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px"></i>Loading…</div>';
  try {
    const res = await fetch(getScriptUrl());
    const data = await res.json();
    allPros = (data.data || []).reverse();
    document.getElementById('cnt').textContent = allPros.length;
    renderCards();
  } catch (err) {
    document.getElementById('cards-container').innerHTML = '<div class="loading-overlay" style="color:#993C1D">Could not load data. Check your script URL.</div>';
  }
}

const ratingLabel = { good: 'Good', acceptable: 'Acceptable', 'no-good': 'No good' };
const ratingClass = { good: 'badge-gd', acceptable: 'badge-ok', 'no-good': 'badge-ng' };
const ratingIcon  = { good: 'ti-mood-smile', acceptable: 'ti-mood-neutral', 'no-good': 'ti-mood-sad' };

function initials(name) { return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

const KNOWN = ['Painting','Plumbing','Handyman','Electrical','HVAC','Landscaping','Cleaning'];

function renderCards() {
  const nameQ   = document.getElementById('fil-name').value.toLowerCase();
  const svcQ    = document.getElementById('fil-service').value;
  const ratingQ = document.getElementById('fil-rating').value;
  const filtered = allPros.filter(p => {
    if (nameQ && !String(p.Name||'').toLowerCase().includes(nameQ)) return false;
    if (svcQ) {
      if (svcQ === 'Other' && KNOWN.includes(p.Service)) return false;
      if (svcQ !== 'Other' && p.Service !== svcQ) return false;
    }
    if (ratingQ && p.Rating !== ratingQ) return false;
    return true;
  });
  const c = document.getElementById('cards-container');
  if (!filtered.length) { c.innerHTML = '<div class="empty"><i class="ti ti-search" style="font-size:32px;display:block;margin-bottom:8px"></i>No professionals found</div>'; return; }
  c.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="avatar">${initials(p.Name||'?')}</div>
      <div class="card-body">
        <div class="card-name">${p.Name}</div>
        <div class="card-phone"><i class="ti ti-phone" style="font-size:12px" aria-hidden="true"></i> ${p.Phone}</div>
        <div class="card-meta">
          <span class="badge badge-svc">${p.Service}</span>
          <span class="badge ${ratingClass[p.Rating]||''}"><i class="ti ${ratingIcon[p.Rating]||'ti-minus'}" style="font-size:12px" aria-hidden="true"></i> ${ratingLabel[p.Rating]||p.Rating}</span>
          <span class="card-date">${p.Date}</span>
        </div>
        ${p.Notes ? `<div class="card-notes">${p.Notes}</div>` : ''}
      </div>
    </div>`).join('');
}

checkConfig();
</script>
</body>
</html>
